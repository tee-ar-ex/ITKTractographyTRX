coverage:
  status:
    project:
      default:
        informational: true
    patch: off

comment: false
github_checks:
  annotations: false

# Only report coverage for library source files, not headers,
# tests, examples, or wrapping glue.
ignore:
  - "test/**"
  - "examples/**"
  - "include/**"
  - "wrapping/**"
  - "benchmarks/**"
